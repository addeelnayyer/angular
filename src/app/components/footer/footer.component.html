<footer class="border-t border-white/[0.06] bg-[#080b14]">
  <div class="mx-auto max-w-7xl px-6 py-16 lg:px-8">
    <div class="grid gap-12 lg:grid-cols-12">
      <!-- Brand Column -->
      <div class="lg:col-span-4">
        <a href="#" class="inline-flex items-center gap-0 text-xl font-bold">
          <span class="text-white">{{ brandName }}</span>
          <span
            class="bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent"
            >{{ brandAccent }}</span
          >
        </a>
        <p class="mt-4 max-w-xs text-sm leading-relaxed text-slate-500">
          {{ tagline }}
        </p>

        <!-- Social Links -->
        <div class="mt-6 flex gap-4">
          <a
            *ngFor="let social of socialLinks"
            [href]="social.href"
            [attr.aria-label]="social.label"
            class="flex h-10 w-10 items-center justify-center rounded-lg border border-white/[0.06] text-slate-500 transition-all hover:border-white/[0.12] hover:bg-white/5 hover:text-white"
          >
            <!-- Twitter / X -->
            <svg
              *ngIf="social.icon === 'twitter'"
              class="h-4 w-4"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"
              />
            </svg>
            <!-- GitHub -->
            <svg
              *ngIf="social.icon === 'github'"
              class="h-4 w-4"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
              />
            </svg>
            <!-- YouTube -->
            <svg
              *ngIf="social.icon === 'youtube'"
              class="h-4 w-4"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
              />
            </svg>
            <!-- Discord -->
            <svg
              *ngIf="social.icon === 'discord'"
              class="h-4 w-4"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286z"
              />
            </svg>
          </a>
        </div>
      </div>

      <!-- Link Groups -->
      <div class="grid grid-cols-2 gap-8 sm:grid-cols-3 lg:col-span-8">
        <div *ngFor="let group of linkGroups">
          <h4
            class="text-sm font-semibold uppercase tracking-wider text-slate-400"
          >
            {{ group.title }}
          </h4>
          <ul class="mt-4 space-y-3">
            <li *ngFor="let link of group.links">
              <a
                [href]="link.href"
                class="text-sm text-slate-500 transition-colors hover:text-white"
              >
                {{ link.label }}
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="mt-12 border-t border-white/[0.06] pt-8">
      <p class="text-center text-xs text-slate-600">{{ copyright }}</p>
    </div>
  </div>
</footer>
