<section class="relative py-24 lg:py-32">
  <!-- Background accent -->
  <div class="pointer-events-none absolute inset-0">
    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
      <div
        class="h-[500px] w-[500px] rounded-full bg-violet-600/10 blur-[120px]"
      ></div>
    </div>
  </div>

  <div class="relative mx-auto max-w-7xl px-6 lg:px-8">
    <!-- Section Header -->
    <div class="mx-auto max-w-2xl text-center">
      <p
        class="mb-3 text-sm font-semibold uppercase tracking-widest text-violet-400"
      >
        {{ sectionLabel }}
      </p>
      <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
        {{ headline }}
      </h2>
      <p class="mt-4 text-lg leading-relaxed text-slate-400">
        {{ subheadline }}
      </p>
    </div>

    <!-- Pricing Grid -->
    <div class="mx-auto mt-16 grid max-w-5xl gap-8 lg:grid-cols-3">
      <app-pricing-card
        *ngFor="let plan of plans"
        [planName]="plan.planName"
        [price]="plan.price"
        [priceSuffix]="plan.priceSuffix ?? '/month'"
        [description]="plan.description"
        [features]="plan.features"
        [ctaLabel]="plan.ctaLabel"
        [ctaHref]="plan.ctaHref ?? '#'"
        [highlighted]="plan.highlighted ?? false"
        [badgeText]="plan.badgeText ?? 'Most Popular'"
      />
    </div>
  </div>
</section>
