<section class="relative py-24 lg:py-32">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <!-- Section Header -->
    <div class="mx-auto max-w-2xl text-center">
      <p
        class="mb-3 text-sm font-semibold uppercase tracking-widest text-violet-400"
      >
        {{ sectionLabel }}
      </p>
      <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
        {{ headline }}
      </h2>
      <p class="mt-4 text-lg leading-relaxed text-slate-400">
        {{ subheadline }}
      </p>
    </div>

    <!-- Steps -->
    <div class="mx-auto mt-16 grid max-w-4xl gap-8 md:grid-cols-3">
      <div
        *ngFor="let step of steps; let last = last"
        class="relative text-center"
      >
        <!-- Connector line (hidden on last step) -->
        <div
          *ngIf="!last"
          class="pointer-events-none absolute left-[calc(50%+2.5rem)] top-8 hidden h-px w-[calc(100%-5rem)] bg-gradient-to-r from-violet-500/30 to-transparent md:block"
        ></div>

        <!-- Step Number -->
        <div
          class="mx-auto flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-violet-600/20 to-fuchsia-600/20 ring-1 ring-violet-500/20"
        >
          <span class="text-xl font-bold text-violet-400">{{
            step.stepNumber
          }}</span>
        </div>

        <!-- Content -->
        <h3 class="mt-6 text-lg font-semibold text-white">{{ step.title }}</h3>
        <p class="mt-2 text-sm leading-relaxed text-slate-400">
          {{ step.description }}
        </p>
      </div>
    </div>
  </div>
</section>
