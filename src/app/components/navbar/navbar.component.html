<nav
  class="fixed top-0 left-0 right-0 z-50 border-b border-white/[0.06] bg-[#0b0f1a]/80 backdrop-blur-xl"
>
  <div
    class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 lg:px-8"
  >
    <!-- Brand -->
    <a
      href="#"
      class="flex items-center gap-0 text-xl font-bold tracking-tight"
    >
      <span class="text-white">{{ brandName }}</span>
      <span
        class="bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent"
        >{{ brandAccent }}</span
      >
    </a>

    <!-- Desktop Nav -->
    <div class="hidden items-center gap-8 md:flex">
      <a
        *ngFor="let link of links"
        [href]="link.href"
        class="text-sm font-medium text-slate-400 transition-colors hover:text-white"
      >
        {{ link.label }}
      </a>
    </div>

    <!-- CTA + Mobile Toggle -->
    <div class="flex items-center gap-4">
      <a
        [href]="ctaHref"
        class="hidden rounded-lg bg-gradient-to-r from-violet-600 to-fuchsia-600 px-5 py-2.5 text-sm font-semibold text-white shadow-lg shadow-violet-500/25 transition-all hover:shadow-violet-500/40 hover:brightness-110 md:inline-flex"
      >
        {{ ctaLabel }}
      </a>

      <!-- Mobile Hamburger -->
      <button
        (click)="toggleMobile()"
        class="inline-flex items-center justify-center rounded-lg p-2 text-slate-400 hover:text-white md:hidden"
        [attr.aria-expanded]="mobileOpen"
        aria-label="Toggle navigation"
      >
        <svg
          *ngIf="!mobileOpen"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
          />
        </svg>
        <svg
          *ngIf="mobileOpen"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div
    *ngIf="mobileOpen"
    class="border-t border-white/[0.06] bg-[#0b0f1a]/95 backdrop-blur-xl md:hidden"
  >
    <div class="space-y-1 px-6 pb-6 pt-4">
      <a
        *ngFor="let link of links"
        [href]="link.href"
        class="block rounded-lg px-3 py-2.5 text-base font-medium text-slate-400 transition-colors hover:bg-white/5 hover:text-white"
      >
        {{ link.label }}
      </a>
      <a
        [href]="ctaHref"
        class="mt-4 block rounded-lg bg-gradient-to-r from-violet-600 to-fuchsia-600 px-5 py-3 text-center text-sm font-semibold text-white"
      >
        {{ ctaLabel }}
      </a>
    </div>
  </div>
</nav>
