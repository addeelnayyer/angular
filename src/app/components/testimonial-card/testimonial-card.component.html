<div
  class="flex h-full flex-col rounded-2xl border border-white/[0.06] bg-white/[0.02] p-6 transition-all duration-300 hover:border-white/[0.12] hover:bg-white/[0.04] lg:p-8"
>
  <!-- Stars -->
  <div class="mb-4 flex gap-1">
    <svg
      *ngFor="let s of stars"
      class="h-5 w-5 text-amber-400"
      fill="currentColor"
      viewBox="0 0 20 20"
    >
      <path
        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"
      />
    </svg>
  </div>

  <!-- Quote -->
  <blockquote class="flex-1 text-base leading-relaxed text-slate-300">
    &ldquo;{{ quote }}&rdquo;
  </blockquote>

  <!-- Author -->
  <div class="mt-6 flex items-center gap-4 border-t border-white/[0.06] pt-6">
    <!-- Avatar -->
    <div
      *ngIf="!authorAvatarUrl"
      class="flex h-10 w-10 items-center justify-center rounded-full bg-gradient-to-br from-violet-500 to-fuchsia-500 text-sm font-bold text-white"
    >
      {{ authorName.charAt(0) }}
    </div>
    <img
      *ngIf="authorAvatarUrl"
      [src]="authorAvatarUrl"
      [alt]="authorName"
      class="h-10 w-10 rounded-full object-cover ring-2 ring-white/10"
    />
    <div>
      <div class="text-sm font-semibold text-white">{{ authorName }}</div>
      <div class="text-xs text-slate-500">{{ authorRole }}</div>
    </div>
  </div>
</div>
