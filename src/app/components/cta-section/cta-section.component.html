<section class="relative overflow-hidden py-24 lg:py-32">
  <!-- Background Effects -->
  <div class="pointer-events-none absolute inset-0">
    <div class="absolute left-1/4 top-0">
      <div
        class="h-[400px] w-[400px] rounded-full bg-violet-600/20 blur-[100px]"
      ></div>
    </div>
    <div class="absolute bottom-0 right-1/4">
      <div
        class="h-[300px] w-[300px] rounded-full bg-fuchsia-600/15 blur-[80px]"
      ></div>
    </div>
  </div>

  <div class="relative mx-auto max-w-7xl px-6 lg:px-8">
    <div
      class="mx-auto max-w-3xl rounded-3xl border border-white/[0.08] bg-gradient-to-b from-white/[0.04] to-transparent p-10 text-center shadow-2xl shadow-violet-500/[0.05] lg:p-16"
    >
      <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
        {{ headline }}
      </h2>
      <p class="mx-auto mt-4 max-w-xl text-lg leading-relaxed text-slate-400">
        {{ description }}
      </p>
      <div
        class="mt-10 flex flex-col items-center justify-center gap-4 sm:flex-row"
      >
        <a
          [href]="primaryCtaHref"
          class="group inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-violet-600 to-fuchsia-600 px-8 py-4 text-base font-semibold text-white shadow-2xl shadow-violet-500/25 transition-all hover:shadow-violet-500/40 hover:brightness-110"
        >
          {{ primaryCtaLabel }}
          <svg
            class="h-4 w-4 transition-transform group-hover:translate-x-0.5"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"
            />
          </svg>
        </a>
        <a
          [href]="secondaryCtaHref"
          class="inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/5 px-8 py-4 text-base font-semibold text-slate-300 backdrop-blur-sm transition-all hover:border-white/20 hover:bg-white/10 hover:text-white"
        >
          {{ secondaryCtaLabel }}
        </a>
      </div>
    </div>
  </div>
</section>
