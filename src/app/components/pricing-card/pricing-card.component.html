<div
  class="relative flex flex-col rounded-2xl border p-8 transition-all duration-300"
  [ngClass]="{
    'border-violet-500/30 bg-gradient-to-b from-violet-500/[0.08] to-transparent shadow-xl shadow-violet-500/10':
      highlighted,
    'border-white/[0.06] bg-white/[0.02] hover:border-white/[0.12]':
      !highlighted,
  }"
>
  <!-- Popular Badge -->
  <div
    *ngIf="highlighted"
    class="absolute -top-3 left-1/2 -translate-x-1/2 rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600 px-4 py-1 text-xs font-semibold text-white shadow-lg"
  >
    {{ badgeText }}
  </div>

  <!-- Plan Name -->
  <h3 class="text-lg font-semibold text-white">{{ planName }}</h3>
  <p class="mt-2 text-sm text-slate-400">{{ description }}</p>

  <!-- Price -->
  <div class="mt-6 flex items-baseline gap-1">
    <span class="text-4xl font-extrabold tracking-tight text-white">{{
      price
    }}</span>
    <span class="text-sm text-slate-500">{{ priceSuffix }}</span>
  </div>

  <!-- Features List -->
  <ul class="mt-8 flex-1 space-y-3">
    <li
      *ngFor="let feature of features"
      class="flex items-start gap-3 text-sm text-slate-300"
    >
      <svg
        class="mt-0.5 h-5 w-5 flex-shrink-0 text-violet-400"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M4.5 12.75l6 6 9-13.5"
        />
      </svg>
      {{ feature }}
    </li>
  </ul>

  <!-- CTA -->
  <a
    [href]="ctaHref"
    class="mt-8 block rounded-xl py-3.5 text-center text-sm font-semibold transition-all"
    [ngClass]="{
      'bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white shadow-lg shadow-violet-500/25 hover:shadow-violet-500/40 hover:brightness-110':
        highlighted,
      'border border-white/10 bg-white/5 text-slate-300 hover:border-white/20 hover:bg-white/10 hover:text-white':
        !highlighted,
    }"
  >
    {{ ctaLabel }}
  </a>
</div>
