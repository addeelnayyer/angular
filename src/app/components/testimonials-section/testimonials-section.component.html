<section class="relative py-24 lg:py-32">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <!-- Section Header -->
    <div class="mx-auto max-w-2xl text-center">
      <p
        class="mb-3 text-sm font-semibold uppercase tracking-widest text-violet-400"
      >
        {{ sectionLabel }}
      </p>
      <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
        {{ headline }}
      </h2>
      <p class="mt-4 text-lg leading-relaxed text-slate-400">
        {{ subheadline }}
      </p>
    </div>

    <!-- Testimonials Grid -->
    <div
      class="mx-auto mt-16 grid max-w-5xl gap-6 sm:grid-cols-2 lg:grid-cols-3"
    >
      <app-testimonial-card
        *ngFor="let t of testimonials"
        [quote]="t.quote"
        [authorName]="t.authorName"
        [authorRole]="t.authorRole"
        [authorAvatarUrl]="t.authorAvatarUrl ?? ''"
        [rating]="t.rating ?? 5"
      />
    </div>
  </div>
</section>
