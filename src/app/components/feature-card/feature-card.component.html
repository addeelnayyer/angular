<div
  class="group relative rounded-2xl border border-white/[0.06] bg-white/[0.02] p-6 transition-all duration-300 hover:border-white/[0.12] hover:bg-white/[0.04] lg:p-8"
>
  <!-- Hover glow -->
  <div
    class="pointer-events-none absolute inset-0 rounded-2xl opacity-0 transition-opacity duration-300 group-hover:opacity-100"
    style="
      background: radial-gradient(
        600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(139, 92, 246, 0.06),
        transparent 40%
      );
    "
  ></div>

  <!-- Icon -->
  <div
    class="mb-5 inline-flex h-12 w-12 items-center justify-center rounded-xl ring-1"
    [ngClass]="iconBgClass"
  >
    <span class="text-2xl" role="img" [attr.aria-label]="title">{{
      icon
    }}</span>
  </div>

  <!-- Title -->
  <h3 class="mb-3 text-lg font-semibold text-white">{{ title }}</h3>

  <!-- Description -->
  <p class="text-sm leading-relaxed text-slate-400">{{ description }}</p>
</div>
