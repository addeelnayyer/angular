<section class="border-y border-white/[0.06] bg-white/[0.01] py-12">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <p
      class="mb-8 text-center text-sm font-medium uppercase tracking-widest text-slate-600"
    >
      {{ headline }}
    </p>
    <div class="flex flex-wrap items-center justify-center gap-x-12 gap-y-6">
      <span
        *ngFor="let logo of logos"
        class="text-lg font-bold tracking-wide text-slate-600/60 transition-colors hover:text-slate-400"
      >
        {{ logo }}
      </span>
    </div>
  </div>
</section>
